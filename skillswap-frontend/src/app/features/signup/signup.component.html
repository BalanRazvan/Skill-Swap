<div class="auth-page">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Join SkillSwap and start learning</p>

    @if (errorMessage()) {
      <div class="error-message">{{ errorMessage() }}</div>
    }

    <form class="auth-form" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" formControlName="full_name" placeholder="Jane Doe" />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="janedoe" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Min. 6 characters" />
      </div>

      <button type="submit" class="btn-submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Sign Up' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
