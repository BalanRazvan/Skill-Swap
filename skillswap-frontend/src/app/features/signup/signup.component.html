<div class="auth-page">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-subtitle">Join SkillSwap and start learning</p>

    <form class="auth-form">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" type="text" placeholder="Jane Doe" />
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="janedoe" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Min. 6 characters" />
      </div>

      <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
