<div class="discover-page">
  <header class="discover-header">
    <h1>Discover Skills & People</h1>
    <p>Find someone who teaches what you want to learn.</p>
  </header>

  <!-- Search & Filters -->
  <div class="search-bar">
    <input type="text" placeholder="Search by name, skill, or category..." />
    <button class="btn-search">Search</button>
  </div>

  <div class="filter-tags">
    <button class="filter-tag active">All</button>
    <button class="filter-tag">Programming</button>
    <button class="filter-tag">Design</button>
    <button class="filter-tag">Music</button>
    <button class="filter-tag">Languages</button>
    <button class="filter-tag">Cooking</button>
    <button class="filter-tag">Photography</button>
  </div>

  <!-- Results Grid -->
  <div class="results-grid">
    <!-- Placeholder user cards -->
    <div class="user-card">
      <div class="user-avatar">?</div>
      <h3>User Name</h3>
      <p class="user-location">Location</p>
      <div class="user-skills">
        <span class="skill-tag teaches">Teaches: Skill</span>
        <span class="skill-tag learns">Learns: Skill</span>
      </div>
      <a routerLink="/profile" class="btn-view-profile">View Profile</a>
    </div>

    <div class="user-card">

      </div>
