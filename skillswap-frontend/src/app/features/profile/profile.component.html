<div class="profile-page">
  <!-- Profile Header -->
  <div class="profile-header">
    <div class="avatar-placeholder">?</div>
    <div class="profile-info">
      <h1>Your Name</h1>
      <p class="username">@username</p>
      <p class="bio">Your bio will appear here. Tell others about yourself!</p>
      <p class="location">Location not set</p>
    </div>
    <button class="btn-edit">Edit Profile</button>
  </div>

  <!-- Skills Sections -->
  <div class="skills-grid">
    <div class="skills-section">
      <div class="section-header">
        <h2>Skills I Teach</h2>
        <button class="btn-add">+ Add Skill</button>
      </div>
      <div class="placeholder-content">
        <p>No teaching skills added yet. Add skills you can share with others.</p>
      </div>
    </div>

    <div class="skills-section">
      <div class="section-header">
        <h2>Skills I Want to Learn</h2>
        <button class="btn-add">+ Add Skill</button>
      </div>
      <div class="placeholder-content">
        <p>No learning skills added yet. Add skills you'd like to pick up.</p>
      </div>
    </div>
  </div>
</div>
