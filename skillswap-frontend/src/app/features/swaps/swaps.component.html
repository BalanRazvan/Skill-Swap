<div class="swaps-page">
  <header class="swaps-header">
    <h1>Skill Swaps</h1>
    <p>Manage your swap requests — sent and received.</p>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active">All</button>
    <button class="tab">Pending</button>
    <button class="tab">Accepted</button>
    <button class="tab">Completed</button>
    <button class="tab">Declined</button>
  </div>

  <!-- Swap List -->
  <div class="swap-list">
    <!-- Placeholder swap item -->
    <div class="swap-item">
      <div class="swap-users">
        <div class="swap-avatar">?</div>
        <div class="swap-details">
          <h3>Swap with <strong>User Name</strong></h3>
          <p>You teach <strong>Skill A</strong> — They teach <strong>Skill B</strong></p>
        </div>
      </div>
      <div class="swap-meta">
        <span class="status-badge pending">Pending</span>
        <div class="swap-actions">
          <button class="btn-accept">Accept</button>
          <button class="btn-decline">Decline</button>
        </div>
      </div>
    </div>

    <div class="swap-item">
      <div class="swap-users">
        <div class="swap-avatar">?</div>
        <div class="swap-details">
          <h3>Swap with <strong>User Name</strong></h3>
          <p>You teach <strong>Skill C</strong> — They teach <strong>Skill D</strong></p>
        </div>
      </div>
      <div class="swap-meta">
        <span class="status-badge accepted">Accepted</span>
        <div class="swap-actions">
          <button class="btn-message">Message</button>
          <button class="btn-complete">Mark Complete</button>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" style="display: none;">
      <p>No swap requests yet. Go to Discover to find your first match!</p>
    </div>
  </div>
</div>
